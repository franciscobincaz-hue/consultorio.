// ── State ──
let S = loadState();
let view = 'dashboard';
let fichaOpen = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const pacientes = {};
  const names = [...new Set(SEED.map(s=>s.paciente))];
  names.forEach(n => {
    const subs = SEED.filter(s=>s.paciente===n);
    pacientes[n] = { nombre:n, notas:'', honorario: subs.slice(-1)[0].facturado };
  });
  return { sesiones: [...SEED], pacientes };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); } catch(e) {}
}

// ── Helpers ──
function fmt(n) { return Math.round(n).toLocaleString('es-AR'); }
function initials(name) { return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function deudaPaciente(nombre) {
  return S.sesiones.filter(s=>s.paciente===nombre).reduce((a,s)=>a+(s.facturado-s.cobrado),0);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2400);
}

// ── Navigation ──
function goTo(v) {
  view = v;
  fichaOpen = null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+v).classList.add('active');
  const titles = {dashboard:'Consultorio',pacientes:'Pacientes',sesiones:'Sesiones',buscar:'Buscar',acciones:'Acciones'};
  document.getElementById('header-title').textContent = titles[v];
  render();
}

function render() {
  const el = document.getElementById('content');
  if (view==='dashboard') el.innerHTML = renderDashboard();
  else if (view==='pacientes') { if (fichaOpen) el.innerHTML = renderFicha(fichaOpen); else el.innerHTML = renderPacientes(); }
  else if (view==='sesiones') el.innerHTML = renderSesiones();
  else if (view==='buscar') el.innerHTML = renderBuscar();
  else if (view==='acciones') el.innerHTML = renderAcciones();
}

// ── Dashboard ──
function renderDashboard() {
  const totalF = S.sesiones.reduce((a,s)=>a+s.facturado,0);
  const totalC = S.sesiones.reduce((a,s)=>a+s.cobrado,0);
  const totalD = totalF - totalC;
  const nPac = Object.keys(S.pacientes).length;

  // chart last 5 months
  const byM = {};
  S.sesiones.forEach(s=>{
    const k = s.anio+'-'+String(s.mes).padStart(2,'0');
    if(!byM[k]) byM[k]={f:0,c:0,lbl:MONTHS[s.mes-1]};
    byM[k].f+=s.facturado; byM[k].c+=s.cobrado;
  });
  const months = Object.values(byM).slice(-5);
  const maxV = Math.max(...months.map(m=>m.f),1);
  const bars = months.map(m=>{
    const hf = Math.round((m.f/maxV)*74);
    const hc = Math.round((m.c/maxV)*74);
    return `<div class="bar-group">
      <div style="display:flex;gap:3px;align-items:flex-end;height:74px">
        <div class="bar" style="height:${hf}px;width:13px;background:var(--teal-mid)"></div>
        <div class="bar" style="height:${hc}px;width:13px;background:var(--teal)"></div>
      </div>
      <div class="bar-label">${m.lbl}</div>
    </div>`;
  }).join('');

  // recent 4
  const recent = [...S.sesiones].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,4);
  const recHtml = recent.map(s=>{
    const d = s.facturado - s.cobrado;
    return `<div class="session-card">
      <div class="session-top">
        <span class="session-patient">${s.paciente}</span>
        <span class="session-date">${s.fecha}</span>
      </div>
      <div class="session-amounts">
        <span class="amount-gray">$${fmt(s.facturado)}</span>
        <span class="amount-ok">cobr $${fmt(s.cobrado)}</span>
        ${d>0?`<span class="amount-pend">debe $${fmt(d)}</span>`:''}
      </div>
      ${s.notas?`<div class="session-notes">${s.notas.substring(0,90)}${s.notas.length>90?'…':''}</div>`:''}
    </div>`;
  }).join('');

  return `
    <div class="metrics-grid">
      <div class="metric"><div class="metric-label">Pacientes</div><div class="metric-value blue">${nPac}</div></div>
      <div class="metric"><div class="metric-label">Sesiones</div><div class="metric-value">${S.sesiones.length}</div></div>
      <div class="metric"><div class="metric-label">Cobrado</div><div class="metric-value green">$${fmt(totalC/1000)}k</div></div>
      <div class="metric"><div class="metric-label">Deuda</div><div class="metric-value ${totalD>0?'red':'green'}">$${fmt(totalD/1000)}k</div></div>
    </div>
    <div class="chart-wrap">
      <div class="section-title" style="margin-bottom:10px">Ingresos por mes</div>
      <div class="chart-bars">${bars}</div>
      <div class="chart-legend">
        <span><span class="leg-dot" style="background:var(--teal-mid)"></span>Facturado</span>
        <span><span class="leg-dot" style="background:var(--teal)"></span>Cobrado</span>
      </div>
    </div>
    <div class="section-title">Últimas sesiones</div>
    ${recHtml}
  `;
}

// ── Pacientes ──
function renderPacientes() {
  const list = Object.values(S.pacientes).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const rows = list.map(p=>{
    const d = deudaPaciente(p.nombre);
    const nsess = S.sesiones.filter(s=>s.paciente===p.nombre).length;
    return `<div class="patient-row card-tap" onclick="openFicha('${p.nombre.replace(/'/g,"\\'")}')">
      <div class="avatar">${initials(p.nombre)}</div>
      <div class="patient-info">
        <div class="patient-name">${p.nombre}</div>
        <div class="patient-sub">${nsess} sesiones · $${fmt(p.honorario)}/ses</div>
      </div>
      <span class="badge ${d>0?'badge-red':'badge-green'}">${d>0?'$'+fmt(d):'Al día'}</span>
    </div>`;
  }).join('');
  return `<div class="card">${rows}</div>`;
}

function openFicha(nombre) {
  fichaOpen = nombre;
  render();
  document.getElementById('content').scrollTop = 0;
}

function renderFicha(nombre) {
  const p = S.pacientes[nombre];
  const sessions = S.sesiones.filter(s=>s.paciente===nombre).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const totalF = sessions.reduce((a,s)=>a+s.facturado,0);
  const totalC = sessions.reduce((a,s)=>a+s.cobrado,0);
  const deuda = totalF - totalC;

  const sesHtml = sessions.map(s=>{
    const d = s.facturado - s.cobrado;
    return `<div class="session-card">
      <div class="session-top">
        <span class="session-date" style="font-weight:600;color:var(--gray-900)">${s.fecha}</span>
        <span class="badge ${d>0?'badge-red':'badge-green'}">${d>0?'Pendiente':'Pagado'}</span>
      </div>
      <div class="session-amounts">
        <span class="amount-gray">$${fmt(s.facturado)}</span>
        <span class="amount-ok">cobr $${fmt(s.cobrado)}</span>
        <span class="amount-gray">${s.formaPago}</span>
      </div>
      ${s.notas?`<div class="session-notes">${s.notas}</div>`:''}
      ${s.accion?`<div class="session-action"><i class="ti ti-arrow-right"></i>${s.accion}</div>`:''}
    </div>`;
  }).join('');

  return `
    <button class="back-btn" onclick="fichaOpen=null;render()">
      <i class="ti ti-chevron-left"></i> Pacientes
    </button>
    <div class="ficha-header">
      <div class="ficha-avatar">${initials(nombre)}</div>
      <div>
        <div class="ficha-name">${nombre}</div>
        <div class="ficha-meta">${sessions.length} sesiones · $${fmt(p.honorario)}/ses</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${sessions.length}</div><div class="stat-lbl">Sesiones</div></div>
      <div class="stat-box"><div class="stat-val green">$${fmt(totalC/1000)}k</div><div class="stat-lbl">Cobrado</div></div>
      <div class="stat-box"><div class="stat-val ${deuda>0?'red':'green'}">${deuda>0?'$'+fmt(deuda/1000)+'k':'✓'}</div><div class="stat-lbl">Deuda</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="notas-label">Notas clínicas</div>
      <textarea id="notas-field" rows="4" placeholder="Diagnóstico, observaciones, hipótesis...">${p.notas||''}</textarea>
      <button class="save-btn" onclick="saveNotas('${nombre.replace(/'/g,"\\'")}')">Guardar notas</button>
      <div class="save-ok" id="save-ok">✓ Guardado</div>
    </div>
    <div class="section-title">Historial</div>
    ${sesHtml}
  `;
}

function saveNotas(nombre) {
  S.pacientes[nombre].notas = document.getElementById('notas-field').value;
  saveState();
  const ok = document.getElementById('save-ok');
  ok.style.display = 'block';
  setTimeout(()=>ok.style.display='none', 2000);
  toast('Notas guardadas');
}

// ── Sesiones ──
function renderSesiones() {
  const sorted = [...S.sesiones].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  return sorted.map(s=>{
    const d = s.facturado - s.cobrado;
    return `<div class="session-card">
      <div class="session-top">
        <span class="session-patient">${s.paciente}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="badge ${d>0?'badge-red':'badge-green'}">${d>0?'Pendiente':'Pagado'}</span>
          <span class="session-date">${s.fecha}</span>
        </div>
      </div>
      <div class="session-amounts">
        <span class="amount-gray">$${fmt(s.facturado)}</span>
        <span class="amount-ok">cobr $${fmt(s.cobrado)}</span>
        ${d>0?`<span class="amount-pend">debe $${fmt(d)}</span>`:''}
        <span class="amount-gray">${s.formaPago}</span>
      </div>
      ${s.notas?`<div class="session-notes">${s.notas}</div>`:''}
      ${s.accion?`<div class="session-action"><i class="ti ti-arrow-right"></i>${s.accion}</div>`:''}
    </div>`;
  }).join('');
}

// ── Buscar ──
function renderBuscar() {
  return `
    <div class="search-wrap">
      <i class="ti ti-search search-icon"></i>
      <input class="search-input" type="search" id="q" placeholder="Buscar en notas..." oninput="doSearch()" autocomplete="off">
    </div>
    <div id="results"><div class="empty"><i class="ti ti-search"></i><p>Escribí para buscar en todas las notas</p></div></div>
  `;
}

function doSearch() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const el = document.getElementById('results');
  if(q.length < 2) { el.innerHTML = '<div class="empty"><i class="ti ti-search"></i><p>Escribí al menos 2 caracteres</p></div>'; return; }
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  const hits = S.sesiones.filter(s=>(s.notas&&s.notas.toLowerCase().includes(q))||(s.accion&&s.accion.toLowerCase().includes(q))||s.paciente.toLowerCase().includes(q));
  if(!hits.length) { el.innerHTML = '<div class="empty"><i class="ti ti-mood-empty"></i><p>Sin resultados</p></div>'; return; }
  const hi = t => t.replace(re, m=>`<span class="highlight">${m}</span>`);
  el.innerHTML = `<div class="section-title">${hits.length} resultado${hits.length!==1?'s':''}</div>` +
    hits.map(s=>`<div class="session-card">
      <div class="session-top"><span class="session-patient">${s.paciente}</span><span class="session-date">${s.fecha}</span></div>
      ${s.notas?`<div class="session-notes">${hi(s.notas)}</div>`:''}
      ${s.accion?`<div class="session-action"><i class="ti ti-arrow-right"></i>${hi(s.accion)}</div>`:''}
    </div>`).join('');
}

// ── Acciones ──
function renderAcciones() {
  const list = S.sesiones.filter(s=>s.accion&&s.accion.trim()).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(!list.length) return '<div class="empty"><i class="ti ti-checkbox"></i><p>No hay acciones registradas</p></div>';
  return `<div class="section-title">${list.length} acción${list.length!==1?'es':''}</div>` +
    list.map(s=>`<div class="action-card">
      <div class="action-who">${s.paciente}</div>
      <div class="action-text">${s.accion}</div>
      <div class="action-when">${s.fecha}</div>
    </div>`).join('');
}

// ── Modal nueva sesión ──
function openModal() {
  const opts = Object.keys(S.pacientes).sort().map(p=>`<option>${p}</option>`).join('');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-handle"></div>
        <h2>Nueva sesión</h2>
        <div class="form-group"><label>Paciente</label>
          <select id="f-pac"><option value="">Seleccionar...</option>${opts}</select>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label>Fecha</label><input type="date" id="f-fecha" value="${today}"></div>
          <div class="form-group"><label>Forma de pago</label>
            <select id="f-pago"><option>Efectivo</option><option>Transferencia MP</option><option>Transferencia banco</option></select>
          </div>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label>Facturado ($)</label><input type="number" id="f-fact" placeholder="45000" inputmode="numeric"></div>
          <div class="form-group"><label>Cobrado ($)</label><input type="number" id="f-cobr" placeholder="45000" inputmode="numeric"></div>
        </div>
        <div class="form-group"><label>Notas de sesión</label>
          <textarea id="f-notas" rows="3" placeholder="Temas trabajados, observaciones..."></textarea>
        </div>
        <div class="form-group"><label>Acción comprometida</label>
          <input type="text" id="f-accion" placeholder="Ej: Llevar registro de sueños">
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button class="btn-save" onclick="guardarSesion()">Guardar</button>
        </div>
      </div>
    </div>`;
}

function closeModal() { document.getElementById('modal-container').innerHTML=''; }

function guardarSesion() {
  const pac = document.getElementById('f-pac').value;
  const fecha = document.getElementById('f-fecha').value;
  if(!pac||!fecha) { toast('Completá paciente y fecha'); return; }
  const fact = parseFloat(document.getElementById('f-fact').value)||0;
  const cobr = parseFloat(document.getElementById('f-cobr').value)||0;
  const notas = document.getElementById('f-notas').value;
  const accion = document.getElementById('f-accion').value;
  const pago = document.getElementById('f-pago').value;
  const d = new Date(fecha);
  S.sesiones.push({ id:Math.random().toString(36).slice(2,10), fecha, mes:d.getMonth()+1, anio:d.getFullYear(), paciente:pac, facturado:fact, cobrado:cobr, formaPago:pago, notas, accion });
  if(S.pacientes[pac]) S.pacientes[pac].honorario = fact||S.pacientes[pac].honorario;
  saveState();
  closeModal();
  toast('Sesión guardada ✓');
  render();
}

// ── Export ──
function exportData() {
  const json = JSON.stringify(S, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'consultorio_backup_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  toast('Backup descargado');
}

// ── Init ──
render();
</script>
